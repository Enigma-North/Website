baseURL = '/'
title = 'Enigma North'
theme = 'hugo-noir'

canonifyURLs = true

enableRobotsTXT = true

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageName = "English"
    title = "Enigma North"
    weight = 1
    contentDir = "content/en"
    [languages.en.menu]
      [[languages.en.menu.main]]
        name = "About"
        pageRef = "/about"
        weight = 1
      [[languages.en.menu.main]]
        name = "Plugins"
        pageRef = "/plugins"
        weight = 2
      [[languages.en.menu.main]]
        name = "Resourcepacks"
        pageRef = "/resourcepacks"
        weight = 3
      [[languages.en.menu.main]]
        name = "Contributors"
        pageRef = "/contributor"
        weight = 4

  [languages.ru]
    languageName = "Русский"
    title = "Enigma North"
    weight = 2
    contentDir = "content/ru"
    [languages.ru.menu]
      [[languages.ru.menu.main]]
        name = "О нас"
        pageRef = "/about"
        weight = 1
      [[languages.ru.menu.main]]
        name = "Плагины"
        pageRef = "/plugins"
        weight = 2
      [[languages.ru.menu.main]]
        name = "Ресурспаки"
        pageRef = "/resourcepacks"
        weight = 3
      [[languages.ru.menu.main]]
        name = "Участники"
        pageRef = "/contributor"
        weight = 4

[taxonomies]
  category = "categories"
  tag = "tags"

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[params]
  name = "Enigma North"
  discord = "sas.hard"
  github = "https://github.com/Enigma-North"
  description = "Developer and porter of Minecraft plugins for Paper servers. Open-source forks updated for current Minecraft versions."
  descriptionRu = "Разработчик и портировщик плагинов для Minecraft на Paper-серверах. Open-source форки, обновлённые под актуальные версии Minecraft."
  keywords = "Minecraft plugins, Paper server, Spigot plugins, Minecraft mods, open source, plugin development"
  keywordsRu = "плагины Minecraft, Paper сервер, Spigot плагины, моды Minecraft, open source, разработка плагинов"
  image = "/favicon-512.png"
  twitterCard = "summary"
  [params.yandex]
    verification = ""
  [params.google]
    verification = ""
