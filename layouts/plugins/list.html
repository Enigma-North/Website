{{ define "main" }}

  <h1 class="list-heading">{{ T "pluginsTitle" }}</h1>

  <div class="plugin-list">
    {{ range .Pages.ByWeight }}
    {{ partial "pcard" . }}
    {{ end }}
  </div>

</div>

<style>
.list-heading { font-size: 2rem; font-weight: 800; color: var(--c-text); letter-spacing: -.02em; margin-bottom: 2rem; }
</style>
{{ end }}
