<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />

    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <!-- Force dark by default; persist user choice -->
    <script>
        (function() {
            var s = localStorage.getItem('color-theme');
            if (s === 'light') { document.documentElement.classList.remove('dark'); }
            else { document.documentElement.classList.add('dark'); if (!s) localStorage.setItem('color-theme','dark'); }
        })();
    </script>

    <style>
        /* ── Design tokens ── */
        :root {
            --c-bg:          #ffffff;
            --c-bg-2:        #f5f5f5;
            --c-bg-3:        #ebebeb;
            --c-text:        #111827;
            --c-text-2:      #4b5563;
            --c-text-3:      #9ca3af;
            --c-border:      #e4e4e7;
            --c-border-2:    #d4d4d8;
            --c-accent:      #0071cd;
            --c-card-a:      #ffffff;
            --c-card-b:      #f9f9f9;
            --c-card-border: #e4e4e7;
            --c-line:        #e8e8e8;
            --c-gh-bg:       #f4f4f5;
            --c-gh-border:   #e4e4e7;
            --c-gh-text:     #4b5563;
            --c-code-bg:     #f0f0f0;
            --c-code-text:   #0071cd;
            --c-pre-bg:      #f5f5f5;
            --c-pre-border:  #e4e4e7;
            --c-pre-text:    #1f2937;
            --c-th-bg:       #f0f0f0;
            --c-td-border:   #e4e4e7;
            --c-bq-bg:       rgba(0,113,205,.05);
        }
        html.dark {
            --c-bg:          #121212;
            --c-bg-2:        #1a1a1a;
            --c-bg-3:        #222222;
            --c-text:        #f0f0f0;
            --c-text-2:      #9ca3af;
            --c-text-3:      #6b7280;
            --c-border:      #242424;
            --c-border-2:    #333333;
            --c-accent:      #0071cd;
            --c-card-a:      #191919;
            --c-card-b:      #141414;
            --c-card-border: #242424;
            --c-line:        #252525;
            --c-gh-bg:       #1c1c1c;
            --c-gh-border:   #2e2e2e;
            --c-gh-text:     #9ca3af;
            --c-code-bg:     #1c1c1c;
            --c-code-text:   #4da6e0;
            --c-pre-bg:      #111111;
            --c-pre-border:  #272727;
            --c-pre-text:    #e5e7eb;
            --c-th-bg:       #1a1a1a;
            --c-td-border:   #2e2e2e;
            --c-bq-bg:       rgba(0,113,205,.04);
        }

        /* ── Base ── */
        html, body { background: var(--c-bg); color: var(--c-text); font-family: 'Space Grotesk', system-ui, sans-serif; }

        /* ── Shared components ── */

        /* Section header */
        .section-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
        .section-title  { font-size: 1.125rem; font-weight: 700; color: var(--c-text-2); white-space: nowrap; }
        .section-line   { flex: 1; height: 1px; background: var(--c-line); }

        /* Plugin card */
        .plugin-list { display: flex; flex-direction: column; gap: .875rem; }
        .pcard {
            background: linear-gradient(135deg, var(--c-card-a) 0%, var(--c-card-b) 100%);
            border: 1px solid var(--c-card-border); border-radius: 14px;
            padding: 1.625rem 1.75rem; cursor: pointer; overflow: hidden;
            transition: border-color .25s, box-shadow .25s, transform .25s;
        }
        .pcard::before {
            content: ''; position: absolute; left: 0; top: 1rem; bottom: 1rem; width: 3px;
            background: var(--c-accent); border-radius: 0 3px 3px 0;
            opacity: 0; transition: opacity .25s;
        }
        .pcard:hover {
            border-color: rgba(0,113,205,.3);
            box-shadow: 0 8px 32px rgba(0,0,0,.12), 0 0 0 1px rgba(0,113,205,.1);
            transform: translateY(-3px);
        }
        html.dark .pcard:hover { box-shadow: 0 8px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(0,113,205,.08); }
        .pcard:hover::before { opacity: 1; }
        .card-overlay   { position: absolute; inset: 0; border-radius: 14px; z-index: 0; }
        .pcard-top      { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: .625rem; }
        .pcard-title    { font-size: 1.1875rem; font-weight: 700; color: var(--c-text); line-height: 1.3; }
        .pcard-arrow    { color: var(--c-accent); flex-shrink: 0; margin-top: .125rem; }
        .pcard-desc     { font-size: .875rem; color: var(--c-text-2); line-height: 1.7; margin-bottom: 1rem; }
        .pcard-badge    { display: inline-flex; align-items: center; gap: .375rem; font-size: .7rem; font-weight: 600; color: var(--c-text-3); margin-bottom: 1.25rem; }
        .pcard-actions  { display: flex; flex-wrap: wrap; gap: .625rem; position: relative; z-index: 10; }
        .pcard-title.hover\:accent:hover { color: var(--c-accent); }

        /* Buttons */
        .btn-dl {
            display: inline-flex; align-items: center; gap: .4rem; padding: .45rem 1rem;
            background: var(--c-accent); color: #fff; font-size: .8125rem; font-weight: 600;
            border-radius: 8px; text-decoration: none;
            transition: opacity .2s, transform .2s; box-shadow: 0 2px 8px rgba(0,113,205,.3);
        }
        .btn-dl:hover { opacity: .88; transform: translateY(-1px); }
        .btn-gh {
            display: inline-flex; align-items: center; gap: .4rem; padding: .45rem 1rem;
            background: var(--c-gh-bg); border: 1px solid var(--c-gh-border); color: var(--c-gh-text);
            font-size: .8125rem; font-weight: 500; border-radius: 8px; text-decoration: none;
            transition: border-color .2s, color .2s;
        }
        .btn-gh:hover { border-color: rgba(0,113,205,.4); color: var(--c-text); }

        /* Large buttons (plugin detail page) */
        .btn-dl-lg {
            display: inline-flex; align-items: center; gap: .5rem; padding: .6rem 1.375rem;
            background: var(--c-accent); color: #fff; font-size: .9rem; font-weight: 700;
            border-radius: 10px; text-decoration: none;
            box-shadow: 0 4px 14px rgba(0,113,205,.3); transition: opacity .2s, transform .2s;
        }
        .btn-dl-lg:hover { opacity: .88; transform: translateY(-1px); }
        .btn-gh-lg {
            display: inline-flex; align-items: center; gap: .5rem; padding: .6rem 1.375rem;
            background: var(--c-gh-bg); border: 1px solid var(--c-gh-border); color: var(--c-gh-text);
            font-size: .9rem; font-weight: 600; border-radius: 10px; text-decoration: none;
            transition: border-color .2s, color .2s;
        }
        .btn-gh-lg:hover { border-color: rgba(0,113,205,.4); color: var(--c-text); }

        /* Coming soon */
        .coming-soon {
            display: inline-flex; align-items: center; gap: .5rem;
            font-size: .8125rem; color: var(--c-text-3); font-weight: 500;
            background: var(--c-bg-2); border: 1px dashed var(--c-border-2);
            padding: .75rem 1.25rem; border-radius: 10px;
        }

        /* README prose */
        .readme { color: var(--c-text-2); line-height: 1.85; font-size: .9375rem; }
        .readme h1,.readme h2,.readme h3,.readme h4 { color: var(--c-text); font-weight: 700; line-height: 1.3; margin-top: 2.25rem; margin-bottom: .75rem; }
        .readme h1 { font-size: 1.875rem; }
        .readme h2 { font-size: 1.375rem; border-bottom: 1px solid var(--c-line); padding-bottom: .5rem; }
        .readme h3 { font-size: 1.125rem; }
        .readme p  { margin-bottom: 1rem; }
        .readme a  { color: var(--c-accent); text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; }
        .readme a:hover { opacity: .75; }
        .readme ul,.readme ol { padding-left: 1.5rem; margin-bottom: 1rem; }
        .readme li { margin-bottom: .35rem; }
        .readme ul { list-style: disc; }
        .readme ol { list-style: decimal; }
        .readme strong { color: var(--c-text); font-weight: 600; }
        .readme blockquote {
            border-left: 3px solid var(--c-accent); margin: 1.25rem 0;
            padding: .75rem 1.25rem; background: var(--c-bq-bg);
            border-radius: 0 8px 8px 0; color: var(--c-text-2);
        }
        .readme code {
            font-family: 'Fira Code','Consolas',monospace;
            font-size: .8125rem; background: var(--c-code-bg); color: var(--c-code-text);
            padding: .15em .45em; border-radius: 5px; border: 1px solid var(--c-border);
        }
        .readme pre {
            background: var(--c-pre-bg); border: 1px solid var(--c-pre-border);
            border-radius: 10px; padding: 1.25rem; overflow-x: auto; margin: 1.25rem 0;
        }
        .readme pre code { background: none; color: var(--c-pre-text); border: none; font-size: .85rem; padding: 0; }
        .readme table { border-collapse: collapse; width: 100%; margin: 1.5rem 0; font-size: .875rem; border-radius: 8px; overflow: hidden; }
        .readme th { background: var(--c-th-bg); color: var(--c-text); font-weight: 600; padding: .6rem 1rem; border-bottom: 1px solid var(--c-td-border); text-align: left; }
        .readme td { padding: .55rem 1rem; border-bottom: 1px solid var(--c-td-border); color: var(--c-text-2); }
        .readme tr:last-child td { border-bottom: none; }
        .readme tbody tr:hover td { background: rgba(0,113,205,.04); }
        .readme img { max-width: 100%; border-radius: 10px; margin: 1.25rem 0; border: 1px solid var(--c-border); display: block; }
        .readme hr  { border: none; border-top: 1px solid var(--c-line); margin: 2rem 0; }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen">
    {{ partial "header" . }}
    <main>{{ block "main" . }}{{ end }}</main>
    {{ partial "footer" . }}
</body>
</html>
