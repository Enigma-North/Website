{{ define "main" }}
<div class="w-full md:w-4/5 lg:w-3/5 mx-auto px-6 py-12">

  <h1 class="contact-h1">{{ .Title }}</h1>
  <p class="contact-intro">{{ T "contactIntro" }}</p>

  <div class="contact-grid">

    <!-- Email (assembled client-side) -->
    <a id="contact-email-link" href="#" class="contact-card">
      <span class="contact-icon">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
          <path d="M2 3.5h12a.5.5 0 0 1 .5.5v.572L8 8.286 1.5 4.572V4a.5.5 0 0 1 .5-.5Zm-.5 2.8V12a.5.5 0 0 0 .5.5h12a.5.5 0 0 0 .5-.5V6.3L8.372 9.8 8 10.014 7.628 9.8 1.5 6.3ZM0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4Z"/>
        </svg>
      </span>
      <div class="min-w-0">
        <div class="contact-label">Email</div>
        <div id="contact-email-text" class="contact-value">—</div>
      </div>
    </a>

    <!-- Discord -->
    <button onclick="copyDiscord()" class="contact-card" style="text-align:left;width:100%;cursor:pointer;">
      <span class="contact-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
      </span>
      <div class="min-w-0 flex-1">
        <div class="contact-label">Discord</div>
        <div class="contact-value">sas.hard</div>
      </div>
      <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>

  </div>
</div>

<style>
.contact-h1    { font-size: 2.25rem; font-weight: 800; color: var(--c-text); letter-spacing: -.02em; margin-bottom: .5rem; }
.contact-intro { font-size: 1rem; color: var(--c-text-2); margin-bottom: 2.5rem; }
.contact-grid  { display: flex; flex-direction: column; gap: .875rem; max-width: 480px; }
@media(min-width:600px){ .contact-grid { flex-direction: row; max-width: none; } }

.contact-card {
  display: flex; align-items: center; gap: 1rem;
  padding: 1.25rem 1.5rem; border-radius: 14px;
  background: linear-gradient(135deg, var(--c-card-a), var(--c-card-b));
  border: 1px solid var(--c-card-border);
  text-decoration: none; flex: 1;
  transition: border-color .2s, transform .2s, box-shadow .2s;
}
.contact-card:hover {
  border-color: rgba(0,113,205,.35);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(0,0,0,.08);
}
html.dark .contact-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.4); }

.contact-icon {
  flex-shrink: 0; width: 42px; height: 42px; border-radius: 10px;
  background: var(--c-bg); border: 1px solid var(--c-border);
  display: flex; align-items: center; justify-content: center;
  color: var(--c-text-2);
}
.contact-label { font-weight: 600; color: var(--c-text); font-size: .9375rem; margin-bottom: .15rem; }
.contact-value { font-size: .8125rem; color: var(--c-text-2); }
.copy-icon     { width: 16px; height: 16px; color: var(--c-text-3); flex-shrink: 0; margin-left: auto; }
</style>

<script>
(function () {
  var u = 'repositories', d = 'rsergeev', t = 'com';
  var e = u + '@' + d + '.' + t;
  var link = document.getElementById('contact-email-link');
  var text = document.getElementById('contact-email-text');
  if (link) link.href = 'mailto:' + e;
  if (text) text.textContent = e;
})();

function copyDiscord() {
  navigator.clipboard.writeText('sas.hard').then(
    function () { showToaster('{{ T "discordCopied" }}'); },
    function () { showToaster('{{ T "discordCopyFailed" }}'); }
  );
}
function showToaster(msg) {
  var el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--c-bg-2);color:var(--c-text);border:1px solid var(--c-border);padding:10px 20px;border-radius:8px;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;font-size:14px;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.15)';
  document.body.appendChild(el);
  requestAnimationFrame(function(){ el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)'; });
  setTimeout(function(){
    el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(8px)';
    setTimeout(function(){ el.remove(); }, 300);
  }, 2800);
}
</script>
{{ end }}
