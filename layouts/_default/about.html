{{ define "main" }}
<div class="w-full md:w-4/5 lg:w-3/5 mx-auto px-6 py-16">

  <!-- Title -->
  <div class="ab-hero">
    <h1 class="ab-title">Enigma North</h1>
    <p class="ab-tag">{{ T "aboutTagline" }}</p>
  </div>

  <!-- Text -->
  <div class="ab-text">{{ .Content }}</div>

  <!-- Stats -->
  <div class="ab-stats">
    <div class="ab-stat">
      <span class="ab-num">3</span>
      <span class="ab-label">{{ T "statPlugins" }}</span>
    </div>
    <div class="ab-stat">
      <span class="ab-num">26.1</span>
      <span class="ab-label">{{ T "statMcVersion" }}</span>
    </div>
    <div class="ab-stat">
      <span class="ab-num">100%</span>
      <span class="ab-label">{{ T "statOpenSource" }}</span>
    </div>
  </div>

  <!-- Links -->
  <div class="ab-links">
    <a href="https://github.com/Repulsiveprogress" target="_blank" rel="noopener noreferrer" class="ab-link">
      <svg width="16" height="16" viewBox="0,0,256,256" fill="currentColor">
        <g transform="scale(8.53333,8.53333)"><path d="M15,3c-6.627,0-12,5.373-12,12 0,5.623 3.872,10.328 9.092,11.63-.056-.162-.092-.35-.092-.583v-2.051c-.487,0-1.303,0-1.508,0-.821,0-1.551-.353-1.905-1.009-.393-.729-.461-1.844-1.435-2.526-.289-.227-.069-.486.264-.451.615.174 1.125.596 1.605 1.222.478.627.703.769 1.596.769.433,0 1.081-.025 1.691-.121.328-.833.895-1.6 1.588-1.962-3.996-.411-5.903-2.399-5.903-5.098 0-1.162.495-2.286 1.336-3.233-.276-.94-.623-2.857.106-3.587 1.798,0 2.885,1.166 3.146,1.481.896-.307 1.88-.481 2.914-.481 1.036,0 2.024.174 2.922.483.258-.313 1.346-1.483 3.148-1.483.732.731.381 2.656.102 3.594.836.945 1.328 2.066 1.328 3.226 0,2.697-1.904,4.684-5.894,5.097 1.098.573 1.899 2.183 1.899 3.396v2.734c0,.104-.023.179-.035.268 4.676-1.639 8.035-6.079 8.035-11.315 0-6.627-5.373-12-12-12z"/></g>
      </svg>
      GitHub
    </a>
    <a href="{{ absLangURL "/contributor/" }}" class="ab-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      {{ T "contributorSub" }}
    </a>
  </div>

</div>

<style>
.ab-hero { margin-bottom: 2.5rem; }
.ab-title { font-size: 1.875rem; font-weight: 800; color: var(--c-text); letter-spacing: -.025em; margin-bottom: .25rem; }
.ab-tag   { font-size: .9rem; color: var(--c-text-3); }

.ab-text {
  font-size: 1rem; color: var(--c-text-2); line-height: 1.9;
  margin-bottom: 2.5rem;
}
.ab-text p { margin-bottom: .75rem; }
.ab-text p:last-child { margin-bottom: 0; }
.ab-text a { color: var(--c-accent); text-decoration: underline; text-underline-offset: 3px; }
.ab-text a:hover { opacity: .75; }

.ab-stats {
  display: flex; gap: 0; margin-bottom: 2rem;
  border: 1px solid var(--c-border); border-radius: 12px; overflow: hidden;
}
.ab-stat {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: .2rem; padding: 1.25rem .75rem;
  border-right: 1px solid var(--c-border);
}
.ab-stat:last-child { border-right: none; }
.ab-num   { font-size: 1.625rem; font-weight: 800; color: var(--c-text); letter-spacing: -.03em; line-height: 1; }
.ab-label { font-size: .7rem; font-weight: 500; color: var(--c-text-3); text-align: center; text-transform: uppercase; letter-spacing: .05em; }

.ab-links { display: flex; flex-wrap: wrap; gap: .5rem; }
.ab-link {
  display: inline-flex; align-items: center; gap: .4rem;
  padding: .4rem .875rem; border-radius: 8px;
  font-size: .8125rem; font-weight: 500; text-decoration: none;
  border: 1px solid var(--c-border); color: var(--c-text-2);
  transition: border-color .2s, color .2s, transform .15s;
}
.ab-link:hover { border-color: rgba(0,113,205,.4); color: var(--c-text); transform: translateY(-1px); }
</style>
{{ end }}
