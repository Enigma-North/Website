<div class="pcard group relative">
  <a href="{{ .Permalink }}" class="card-overlay" aria-label="{{ .Title }}"></a>

  <div class="pcard-top">
    <h3 class="pcard-title group-hover:text-[#0071cd] transition-colors duration-200">{{ .Title }}</h3>
    <svg class="pcard-arrow opacity-0 group-hover:opacity-100 transition-all duration-200 group-hover:translate-x-0.5 group-hover:-translate-y-0.5" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M7 17l9.2-9.2M17 17V7H7"/>
    </svg>
  </div>

  <p class="pcard-desc">{{ .Params.summary }}</p>

  {{ if .Params.version }}
  <div class="pcard-badge">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    {{ .Params.version }}
  </div>
  {{ end }}

  <div class="pcard-actions">
    {{ with .Params.download }}
    <a href="{{ . }}" target="_blank" rel="noopener noreferrer" class="btn-dl">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      {{ T "downloadBtn" }}
    </a>
    {{ end }}
    {{ with .Params.github }}
    <a href="{{ . }}" target="_blank" rel="noopener noreferrer" class="btn-gh">
      <svg width="14" height="14" viewBox="0,0,256,256" fill="currentColor">
        <g transform="scale(8.53333,8.53333)"><path d="M15,3c-6.627,0-12,5.373-12,12 0,5.623 3.872,10.328 9.092,11.63-.056-.162-.092-.35-.092-.583v-2.051c-.487,0-1.303,0-1.508,0-.821,0-1.551-.353-1.905-1.009-.393-.729-.461-1.844-1.435-2.526-.289-.227-.069-.486.264-.451.615.174 1.125.596 1.605 1.222.478.627.703.769 1.596.769.433,0 1.081-.025 1.691-.121.328-.833.895-1.6 1.588-1.962-3.996-.411-5.903-2.399-5.903-5.098 0-1.162.495-2.286 1.336-3.233-.276-.94-.623-2.857.106-3.587 1.798,0 2.885,1.166 3.146,1.481.896-.307 1.88-.481 2.914-.481 1.036,0 2.024.174 2.922.483.258-.313 1.346-1.483 3.148-1.483.732.731.381 2.656.102 3.594.836.945 1.328 2.066 1.328 3.226 0,2.697-1.904,4.684-5.894,5.097 1.098.573 1.899 2.183 1.899 3.396v2.734c0,.104-.023.179-.035.268 4.676-1.639 8.035-6.079 8.035-11.315 0-6.627-5.373-12-12-12z"/></g>
      </svg>
      GitHub
    </a>
    {{ end }}
  </div>
</div>
